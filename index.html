<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>THB 3人練習</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#1e5230;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;min-height:100vh}
button{cursor:pointer;border:none;transition:filter .12s,transform .08s}
button:hover{filter:brightness(1.12)}
button:active{transform:scale(.96)}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useCallback}=React;

// ── 常數 ──────────────────────────────────────────────────────
const RC='23456789TJQKA';
const SYMS=['♠','♥','♦','♣'];
const IS_RED=[false,true,true,false];
const FT=29,TT=51,RT=51;

const DECK=[];
for(let r=0;r<13;r++) for(let s=0;s<4;s++) DECK.push({r:r+2,rc:RC[r],s,id:r*4+s});

function rndShuffle(arr){
  const d=[...arr];
  for(let i=d.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[d[i],d[j]]=[d[j],d[i]];}
  return d;
}
function dealHand(){
  const d=rndShuffle(DECK);
  // d[0]=d1, d[1]=d2, d[2..6]=community, d[7..8]=p1, d[9..10]=p2, d[11..12]=p3
  return{dealer:[d[0],d[1]],com:d.slice(2,7),
    players:[{id:0,label:'玩家 1',hole:[d[7],d[8]]},
             {id:1,label:'玩家 2',hole:[d[9],d[10]]},
             {id:2,label:'玩家 3',hole:[d[11],d[12]]}]};
}

// ── 牌型評分 ──────────────────────────────────────────────────
function stTop(rks){
  const u=[...new Set(rks)].sort((a,b)=>b-a);
  if(u.length<5)return 0;
  for(let i=0;i<=u.length-5;i++)if(u[i]-u[i+4]===4)return u[i];
  if([14,2,3,4,5].every(v=>u.includes(v)))return 5;
  return 0;
}
function eval7(cards){
  const su=[0,0,0,0];cards.forEach(c=>su[c.s]++);
  const rks=cards.map(c=>c.r).sort((a,b)=>b-a);
  const fs=su.findIndex(n=>n>=5);
  if(fs>=0){const fr=cards.filter(c=>c.s===fs).map(c=>c.r).sort((a,b)=>b-a);const sf=stTop(fr);if(sf)return 8e8+sf;}
  const cnt={};rks.forEach(r=>cnt[r]=(cnt[r]||0)+1);
  const g=Object.entries(cnt).map(([r,n])=>({r:+r,n})).sort((a,b)=>b.n-a.n||b.r-a.r);
  if(g[0].n===4)return 7e8+(g[0].r<<16)+g.find(x=>x.r!==g[0].r).r;
  if(g[0].n===3&&g[1]&&g[1].n>=2)return 6e8+(g[0].r<<16)+g[1].r;
  if(fs>=0){const fr=cards.filter(c=>c.s===fs).map(c=>c.r).sort((a,b)=>b-a);return 5e8+fr.slice(0,5).reduce((a,r,i)=>a+(r<<(4*(4-i))),0);}
  const st=stTop(rks);if(st)return 4e8+st;
  if(g[0].n===3)return 3e8+(g[0].r<<16)+(g[1].r<<4)+g[2].r;
  if(g[0].n===2&&g[1]&&g[1].n===2){const k=g.find(x=>x.n===1).r;return 2e8+(g[0].r<<16)+(g[1].r<<8)+k;}
  if(g[0].n===2){const ks=rks.filter(r=>r!==g[0].r).slice(0,3);return 1e8+(g[0].r<<16)+(ks[0]<<8)+(ks[1]<<4)+ks[2];}
  return rks.slice(0,5).reduce((a,r,i)=>a+(r<<(4*(4-i))),0);
}
function handName(s){
  if(s>=8e8)return'同花順';if(s>=7e8)return'四條';if(s>=6e8)return'葫蘆';
  if(s>=5e8)return'同花';if(s>=4e8)return'順子';if(s>=3e8)return'三條';
  if(s>=2e8)return'兩對';if(s>=1e8)return'一對';return'高牌';
}

// ── 勝率計算（花色全部已知，更精確）──────────────────────────
// Flop: MC，d1 和 f1 花色已知
function flopEq(hole, d1, f1, N=600){
  const known=new Set([...hole,d1,f1].map(c=>c.r*4+c.s));
  let w=0,t=0,total=0;
  for(let i=0;i<N;i++){
    const rem=DECK.filter(c=>!known.has(c.r*4+c.s));
    const sh=rndShuffle(rem);
    const d2=sh[0],com=[f1,sh[1],sh[2],sh[3],sh[4]];
    const ps=eval7([...hole,...com]),ds=eval7([d1,d2,...com]);
    if(ps>ds)w++;else if(ps===ds)t++;
    total++;
  }
  return total>0?(w+t/2)/total*100:50;
}

// Turn: 枚舉 d2×turn，抽樣 river×1（d1 花色已知，速度快 3 倍）
function turnWR(hole, d1, com3){
  const known=new Set([...hole,d1,...com3].map(c=>c.r*4+c.s));
  const rem=DECK.filter(c=>!known.has(c.r*4+c.s));
  let w=0,t=0,total=0;
  for(let i=0;i<rem.length;i++){
    const d2=rem[i],rem2=rem.filter((_,k)=>k!==i);
    for(let j=0;j<rem2.length;j++){
      const turn=rem2[j],rem3=rem2.filter((_,k)=>k!==j);
      const river=rem3[Math.floor(Math.random()*rem3.length)];
      const com5=[...com3,turn,river];
      const ps=eval7([...hole,...com5]),ds=eval7([d1,d2,...com5]);
      if(ps>ds)w++;else if(ps===ds)t++;
      total++;
    }
  }
  return total>0?(w+t/2)/total*100:50;
}

// River: 精確枚舉 d2×river（d1 花色已知，完全精確）
function riverWR(hole, d1, com4){
  const known=new Set([...hole,d1,...com4].map(c=>c.r*4+c.s));
  const rem=DECK.filter(c=>!known.has(c.r*4+c.s));
  let w=0,t=0,total=0;
  for(let i=0;i<rem.length;i++){
    const d2=rem[i];
    for(let j=0;j<rem.length;j++){
      if(j===i)continue;
      const river=rem[j],com5=[...com4,river];
      const ps=eval7([...hole,...com5]),ds=eval7([d1,d2,...com5]);
      if(ps>ds)w++;else if(ps===ds)t++;
      total++;
    }
  }
  return total>0?(w+t/2)/total*100:50;
}

function calcPnL(hole,dealer,com,bets){
  const ps=eval7([...hole,...com]),ds=eval7([...dealer,...com]);
  const side=bets.flop+(bets.turn||0)+(bets.river||0);
  if(ps>ds)return{result:'win',pnl:side+(ps>=4e8?1:0),ps,ds};
  if(ps===ds)return{result:'tie',pnl:0,ps,ds};
  return{result:'lose',pnl:-(1+side),ps,ds};
}

// ── 牌面元件（仿照原版大數字+花色風格）──────────────────────
function Card({card,hidden,w=72,h=96}){
  if(hidden)return(
    <div style={{width:w,height:h,borderRadius:9,flexShrink:0,
      background:'linear-gradient(150deg,#0d2f45 0%,#1a4f70 100%)',
      border:'2px solid rgba(255,255,255,.12)',
      boxShadow:'2px 3px 8px rgba(0,0,0,.5)',
      display:'flex',alignItems:'center',justifyContent:'center'}}>
      <span style={{color:'rgba(255,255,255,.12)',fontSize:h*.4}}>♠</span>
    </div>
  );
  const col=IS_RED[card.s]?'#c0392b':'#1e3a5f';
  return(
    <div style={{width:w,height:h,borderRadius:9,flexShrink:0,
      background:'#fefdf8',border:'1px solid #e0d8c0',
      boxShadow:'2px 3px 8px rgba(0,0,0,.35)',
      display:'flex',flexDirection:'column',alignItems:'center',
      justifyContent:'center',gap:2}}>
      <div style={{fontWeight:900,fontSize:h*.38,color:col,lineHeight:1}}>{card.rc}</div>
      <div style={{fontSize:h*.33,color:col,lineHeight:1}}>{SYMS[card.s]}</div>
    </div>
  );
}

// ── 主程式 ────────────────────────────────────────────────────
function App(){
  // 顏色
  const BG='#1e5230', DIM='rgba(255,255,255,.45)', ACC='#f0c040',
        GRN='#2ecc71', RED='#e74c3c', BLU='#4a90d9';

  const [deal,setDeal]=useState(null);
  const [pState,setPState]=useState(null); // 每位玩家的狀態
  const [phase,setPhase]=useState('start');
  const [computing,setComputing]=useState(null);
  const [stats,setStats]=useState({
    hands:0,pnl:0,
    flop:{c:0,t:0},turn:{c:0,t:0},river:{c:0,t:0}
  });

  // ── 開始新一手 ─────────────────────────────────────────────
  const startNew=()=>{
    const h=dealHand();
    setDeal(h);
    setPState(h.players.map(p=>({
      id:p.id,label:p.label,hole:p.hole,
      folded:false,
      bets:{flop:0,turn:0,river:0},
      choices:{flop:null,turn:null,river:null},
      metrics:{flopEq:null,turnWr:null,riverWr:null},
      outcome:null
    })));
    setPhase('flop_decide');
    setComputing(null);
  };

  // ── Flop 決策 ─────────────────────────────────────────────
  const onFlop=(pid,choice)=>{
    const updated=pState.map(p=>p.id!==pid?p:{...p,choices:{...p.choices,flop:choice}});
    const allDone=updated.every(p=>p.choices.flop!==null);
    if(!allDone){setPState(updated);return;}

    // 全部決策好：計算 equity、設定 folded
    const withEq=updated.map(p=>{
      const eq=flopEq(p.hole,deal.dealer[0],deal.com[0]);
      const folded=p.choices.flop==='fold';
      return{...p,metrics:{...p.metrics,flopEq:eq},folded,
             bets:{...p.bets,flop:folded?0:2}};
    });

    const active=withEq.filter(p=>!p.folded);
    if(active.length===0){
      // 全棄
      const final=withEq.map(p=>({...p,outcome:{result:'fold',pnl:-1,ps:null,ds:null}}));
      setPState(final);
      setStats(s=>accumStats(s,final));
      setPhase('showdown');
    } else {
      // 計算 Turn WR
      setPState(withEq);
      setComputing('計算 Turn 勝率');
      let i=0; let cur=[...withEq];
      const step=()=>{
        if(i>=active.length){
          setPState(cur); setComputing(null); setPhase('turn_decide'); return;
        }
        const p=active[i];
        const wr=turnWR(p.hole,deal.dealer[0],deal.com.slice(0,3));
        cur=cur.map(x=>x.id!==p.id?x:{...x,metrics:{...x.metrics,turnWr:wr}});
        i++; setComputing(`計算 Turn 勝率 (${i}/${active.length})`);
        setTimeout(step,15);
      };
      setTimeout(step,15);
    }
  };

  // ── Turn 決策 ─────────────────────────────────────────────
  const onTurn=(pid,choice)=>{
    const updated=pState.map(p=>p.id!==pid||p.folded?p:
      {...p,choices:{...p.choices,turn:choice},bets:{...p.bets,turn:choice==='bet'?1:0}});
    const active=updated.filter(p=>!p.folded);
    if(!active.every(p=>p.choices.turn!==null)){setPState(updated);return;}

    setPState(updated);
    setComputing('計算 River 勝率');
    let i=0; let cur=[...updated];
    const step=()=>{
      if(i>=active.length){
        setPState(cur); setComputing(null); setPhase('river_decide'); return;
      }
      const p=active[i];
      const wr=riverWR(p.hole,deal.dealer[0],deal.com.slice(0,4));
      cur=cur.map(x=>x.id!==p.id?x:{...x,metrics:{...x.metrics,riverWr:wr}});
      i++; setComputing(`計算 River 勝率 (${i}/${active.length})`);
      setTimeout(step,15);
    };
    setTimeout(step,15);
  };

  // ── River 決策 ────────────────────────────────────────────
  const onRiver=(pid,choice)=>{
    const updated=pState.map(p=>p.id!==pid||p.folded?p:
      {...p,choices:{...p.choices,river:choice},bets:{...p.bets,river:choice==='bet'?1:0}});
    const active=updated.filter(p=>!p.folded);
    if(!active.every(p=>p.choices.river!==null)){setPState(updated);return;}

    const final=updated.map(p=>{
      if(p.folded)return{...p,outcome:{result:'fold',pnl:-1,ps:null,ds:null}};
      return{...p,outcome:calcPnL(p.hole,deal.dealer,deal.com,p.bets)};
    });
    setPState(final);
    setStats(s=>accumStats(s,final));
    setPhase('showdown');
  };

  // ── 統計累積 ──────────────────────────────────────────────
  function accumStats(s,ps){
    let ns={...s,hands:s.hands+1,
      pnl:s.pnl+ps.reduce((a,p)=>a+(p.outcome?.pnl||0),0)};
    ps.forEach(p=>{
      const m=p.metrics,c=p.choices;
      if(m.flopEq!==null&&c.flop!==null){
        ns={...ns,flop:{t:ns.flop.t+1,c:ns.flop.c+
          ((c.flop==='bet'&&m.flopEq>FT)||(c.flop==='fold'&&m.flopEq<=FT)?1:0)}};
      }
      if(m.turnWr!==null&&c.turn!==null){
        ns={...ns,turn:{t:ns.turn.t+1,c:ns.turn.c+
          ((c.turn==='bet'&&m.turnWr>TT)||(c.turn==='check'&&m.turnWr<=TT)?1:0)}};
      }
      if(m.riverWr!==null&&c.river!==null){
        ns={...ns,river:{t:ns.river.t+1,c:ns.river.c+
          ((c.river==='bet'&&m.riverWr>RT)||(c.river==='check'&&m.riverWr<=RT)?1:0)}};
      }
    });
    return ns;
  }

  // ── 公牌顯示邏輯 ──────────────────────────────────────────
  const visibleCom = phase==='showdown'?5:
    phase==='river_decide'?4:
    (phase==='turn_decide'||phase==='computing_river')?3:1; // flop phase: only c1 visible

  // ── 按鈕樣式 ──────────────────────────────────────────────
  const btnBase={padding:'8px 0',borderRadius:7,fontWeight:700,fontSize:13,border:'none',flex:1};
  const bG={...btnBase,background:'#27ae60',color:'#fff'};
  const bR={...btnBase,background:'#c0392b',color:'#fff'};
  const bGr={...btnBase,background:'rgba(255,255,255,.15)',color:'#fff',
    border:'1px solid rgba(255,255,255,.25)'};

  // ── 玩家格 ────────────────────────────────────────────────
  function PlayerBox({p}){
    const fDone=p.choices.flop!==null;
    const tDone=p.choices.turn!==null;
    const rDone=p.choices.river!==null;
    const dim=p.folded&&phase!=='showdown'&&phase!=='flop_decide';

    let actionArea=null;
    if(!computing){
      if(phase==='flop_decide'&&!fDone){
        actionArea=<div style={{display:'flex',gap:6}}>
          <button style={bR} onClick={()=>onFlop(p.id,'fold')}>棄牌 FOLD</button>
          <button style={bG} onClick={()=>onFlop(p.id,'bet')}>BET 2×</button>
        </div>;
      } else if(phase==='flop_decide'&&fDone){
        actionArea=<div style={{fontSize:12,color:DIM}}>
          已選 <b style={{color:'#fff'}}>{p.choices.flop==='fold'?'棄牌':'BET 2×'}</b>，等待其他玩家…
        </div>;
      } else if(phase==='turn_decide'&&!p.folded&&!tDone){
        actionArea=<div style={{display:'flex',gap:6}}>
          <button style={bGr} onClick={()=>onTurn(p.id,'check')}>Check</button>
          <button style={bG} onClick={()=>onTurn(p.id,'bet')}>BET 1×</button>
        </div>;
      } else if(phase==='turn_decide'&&!p.folded&&tDone){
        actionArea=<div style={{fontSize:12,color:DIM}}>
          已選 <b style={{color:'#fff'}}>{p.choices.turn==='check'?'Check':'BET 1×'}</b>，等待其他玩家…
        </div>;
      } else if(phase==='river_decide'&&!p.folded&&!rDone){
        actionArea=<div style={{display:'flex',gap:6}}>
          <button style={bGr} onClick={()=>onRiver(p.id,'check')}>Check</button>
          <button style={bG} onClick={()=>onRiver(p.id,'bet')}>BET 1×</button>
        </div>;
      } else if(phase==='river_decide'&&!p.folded&&rDone){
        actionArea=<div style={{fontSize:12,color:DIM}}>
          已選 <b style={{color:'#fff'}}>{p.choices.river==='check'?'Check':'BET 1×'}</b>，等待其他玩家…
        </div>;
      }
    }

    // 開牌結果
    let resultArea=null;
    if(phase==='showdown'&&p.outcome){
      const o=p.outcome;
      const m=p.metrics,c=p.choices;
      const rc=o.result==='win'?GRN:o.result==='tie'?ACC:RED;
      const rl={win:'✓ 贏',tie:'～平手',fold:'棄牌',lose:'✗ 輸'}[o.result];
      const fOk=m.flopEq!==null&&((c.flop==='bet'&&m.flopEq>FT)||(c.flop==='fold'&&m.flopEq<=FT));
      const tOk=m.turnWr!==null&&((c.turn==='bet'&&m.turnWr>TT)||(c.turn==='check'&&m.turnWr<=TT));
      const rOk=m.riverWr!==null&&((c.river==='bet'&&m.riverWr>RT)||(c.river==='check'&&m.riverWr<=RT));
      resultArea=(
        <div>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
            <span style={{fontWeight:700,color:rc,fontSize:15}}>{rl}</span>
            <span style={{fontWeight:800,fontSize:20,color:o.pnl>0?GRN:o.pnl<0?RED:ACC}}>
              {o.pnl>=0?'+':''}{o.pnl} ante
            </span>
          </div>
          {o.ps!=null&&(
            <div style={{fontSize:11,color:DIM,marginBottom:5}}>
              {handName(o.ps)} vs 莊{handName(o.ds)}
            </div>
          )}
          <div style={{fontSize:11,display:'flex',flexDirection:'column',gap:3,
            background:'rgba(0,0,0,.2)',borderRadius:6,padding:'6px 8px'}}>
            {m.flopEq!==null&&(
              <div style={{display:'flex',justifyContent:'space-between',color:fOk?GRN:RED}}>
                <span>Flop {fOk?'✓':'✗'} {m.flopEq.toFixed(1)}%→{m.flopEq>FT?'BET':'棄'}</span>
                <span>你：{c.flop==='fold'?'棄':'BET'}</span>
              </div>
            )}
            {m.turnWr!==null&&(
              <div style={{display:'flex',justifyContent:'space-between',color:tOk?GRN:RED}}>
                <span>Turn {tOk?'✓':'✗'} {m.turnWr.toFixed(1)}%→{m.turnWr>TT?'BET':'Chk'}</span>
                <span>你：{c.turn==='bet'?'BET':'Chk'}</span>
              </div>
            )}
            {m.riverWr!==null&&(
              <div style={{display:'flex',justifyContent:'space-between',color:rOk?GRN:RED}}>
                <span>River {rOk?'✓':'✗'} {m.riverWr.toFixed(1)}%→{m.riverWr>RT?'BET':'Chk'}</span>
                <span>你：{c.river==='bet'?'BET':'Chk'}</span>
              </div>
            )}
          </div>
        </div>
      );
    }

    // 下注顯示
    const betLine=<div style={{fontSize:11,color:DIM,marginBottom:6,display:'flex',gap:8}}>
      <span>Ante<b style={{color:'#fff',marginLeft:2}}>1</b></span>
      {p.bets.flop>0&&<span>F<b style={{color:ACC,marginLeft:2}}>{p.bets.flop}×</b></span>}
      {p.bets.turn>0&&<span>T<b style={{color:ACC,marginLeft:2}}>{p.bets.turn}×</b></span>}
      {p.bets.river>0&&<span>R<b style={{color:ACC,marginLeft:2}}>{p.bets.river}×</b></span>}
    </div>;

    return(
      <div style={{flex:1,minWidth:0,background:'rgba(0,0,0,.18)',
        border:'1px dashed rgba(255,255,255,.2)',borderRadius:12,padding:'12px',
        opacity:dim?.6:1,display:'flex',flexDirection:'column',gap:8,
        color:'#f0efe8'}}>
        {/* 玩家標題 */}
        <div style={{textAlign:'center',fontWeight:700,fontSize:14,color:ACC,letterSpacing:.5}}>
          {p.label}
          {p.folded&&phase!=='showdown'&&phase!=='flop_decide'&&
            <span style={{color:RED,fontWeight:400,fontSize:12}}> （棄牌）</span>}
        </div>
        {/* 手牌 */}
        <div style={{display:'flex',gap:8,justifyContent:'center'}}>
          <Card card={p.hole[0]} w={72} h={96}/>
          <Card card={p.hole[1]} w={72} h={96}/>
        </div>
        {/* 下注列 */}
        {betLine}
        {/* 動作按鈕 / 等待 */}
        {actionArea}
        {/* 結果 */}
        {resultArea}
      </div>
    );
  }

  // ── 統計條 ────────────────────────────────────────────────
  function Pct({label,s,threshold}){
    const pct=s.t>0?Math.round(s.c/s.t*100):null;
    const col=pct===null?'#fff':pct>=70?GRN:pct>=50?ACC:RED;
    return(
      <div style={{background:'rgba(0,0,0,.35)',borderRadius:7,padding:'4px 10px',
        display:'flex',alignItems:'center',gap:6}}>
        <span style={{fontSize:11,color:DIM}}>{label}</span>
        <span style={{fontWeight:700,fontSize:14,color:col}}>
          {pct===null?'-':pct+'%'}
        </span>
        {s.t>0&&<span style={{fontSize:10,color:DIM}}>{s.c}/{s.t}</span>}
      </div>
    );
  }

  // ── 開始畫面 ──────────────────────────────────────────────
  if(phase==='start') return(
    <div style={{minHeight:'100vh',background:BG,display:'flex',flexDirection:'column',
      alignItems:'center',justifyContent:'center',color:'#f0efe8',padding:'20px'}}>
      <div style={{textAlign:'center',maxWidth:460}}>
        <div style={{fontSize:56,marginBottom:8}}>🎴</div>
        <h1 style={{fontSize:28,fontWeight:800,color:ACC,marginBottom:10}}>THB 3人練習</h1>
        <p style={{color:DIM,lineHeight:1.7,fontSize:13,marginBottom:18}}>
          每手同時發 3 家牌，莊家和公牌第一張花色完全已知。<br/>
          依序為每位玩家做 Flop → Turn → River 決策，<br/>一局結束後統一顯示所有結果和正確率。
        </p>
        <div style={{background:'rgba(0,0,0,.3)',borderRadius:10,padding:'14px 18px',
          marginBottom:22,textAlign:'left',fontSize:13,lineHeight:2.2}}>
          <div>🂠 <span style={{color:ACC,fontWeight:700}}>Flop</span>：equity &gt; {FT}% → BET 2×</div>
          <div>🂠 <span style={{color:ACC,fontWeight:700}}>Turn</span>：勝率 &gt; {TT}% → BET 1×</div>
          <div>🂠 <span style={{color:ACC,fontWeight:700}}>River</span>：勝率 &gt; {RT}% → BET 1×</div>
          <div style={{color:DIM,fontSize:11,marginTop:2}}>
            贏（高牌）：side bets 1:1，Ante 退回 ／ 贏（順子+）：全部 1:1 ／ 輸：全輸
          </div>
        </div>
        <button style={{background:GRN,color:'#fff',border:'none',borderRadius:9,
          fontWeight:700,fontSize:17,padding:'14px 48px',cursor:'pointer'}} onClick={startNew}>
          開始練習 →
        </button>
      </div>
    </div>
  );

  // ── 遊戲主畫面 ────────────────────────────────────────────
  const totalPnl=phase==='showdown'&&pState?pState.reduce((s,p)=>s+(p.outcome?.pnl||0),0):null;

  return(
    <div style={{minHeight:'100vh',background:BG,color:'#f0efe8',
      display:'flex',flexDirection:'column',padding:'12px',gap:10}}>

      {/* 頂部：統計 + 新一局 */}
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:8}}>
        <div style={{display:'flex',gap:6,flexWrap:'wrap',alignItems:'center'}}>
          <div style={{background:'rgba(0,0,0,.35)',borderRadius:7,padding:'4px 10px',
            display:'flex',alignItems:'center',gap:6}}>
            <span style={{fontSize:11,color:DIM}}>手數</span>
            <span style={{fontWeight:700,fontSize:14}}>{stats.hands}</span>
          </div>
          <Pct label="Flop" s={stats.flop}/>
          <Pct label="Turn" s={stats.turn}/>
          <Pct label="River" s={stats.river}/>
          <div style={{background:'rgba(0,0,0,.35)',borderRadius:7,padding:'4px 10px',
            display:'flex',alignItems:'center',gap:6}}>
            <span style={{fontSize:11,color:DIM}}>損益</span>
            <span style={{fontWeight:700,fontSize:14,
              color:stats.pnl>0?GRN:stats.pnl<0?RED:'#fff'}}>
              {stats.pnl>=0?'+':''}{stats.pnl}
            </span>
          </div>
        </div>
        <button style={{background:'rgba(255,255,255,.15)',color:'#fff',border:'1px solid rgba(255,255,255,.3)',
          borderRadius:8,fontWeight:600,fontSize:13,padding:'7px 16px',cursor:'pointer',
          display:'flex',alignItems:'center',gap:5}} onClick={startNew}>
          ↺ 新的一局
        </button>
      </div>

      {/* 公牌 - 橢圓容器 */}
      <div style={{background:'rgba(0,0,0,.22)',borderRadius:60,padding:'14px 28px',
        display:'flex',flexDirection:'column',alignItems:'center',gap:10}}>
        <div style={{fontSize:13,fontWeight:600,color:DIM,letterSpacing:1}}>公牌 COMMUNITY</div>
        <div style={{display:'flex',gap:10,justifyContent:'center'}}>
          {deal&&deal.com.map((c,i)=>{
            if(i<visibleCom)return<Card key={i} card={c} w={72} h={96}/>;
            return<Card key={i} card={c} hidden w={72} h={96}/>;
          })}
        </div>
        {/* 當前階段提示 */}
        {computing&&(
          <div style={{fontSize:12,color:DIM}}>⏳ {computing}…</div>
        )}
        {!computing&&phase!=='showdown'&&(
          <div style={{fontSize:12,color:ACC,fontWeight:600}}>
            {phase==='flop_decide'&&`Flop 決策 — equity > ${FT}%？`}
            {phase==='turn_decide'&&`Turn 決策 — 勝率 > ${TT}%？`}
            {phase==='river_decide'&&`River 決策 — 勝率 > ${RT}%？`}
          </div>
        )}
      </div>

      {/* 莊家 - 圓角容器 */}
      <div style={{background:'rgba(0,0,0,.22)',borderRadius:16,padding:'12px 24px',
        display:'flex',flexDirection:'column',alignItems:'center',gap:10}}>
        <div style={{fontSize:13,fontWeight:600,color:DIM,letterSpacing:.5}}>莊家</div>
        <div style={{display:'flex',gap:10,justifyContent:'center'}}>
          {deal&&<>
            <Card card={deal.dealer[0]} w={72} h={96}/>
            <Card card={deal.dealer[1]} hidden={phase!=='showdown'} w={72} h={96}/>
          </>}
        </div>
        {phase==='showdown'&&deal&&(
          <div style={{fontSize:12,color:DIM}}>
            {handName(eval7([...deal.dealer,...deal.com]))}
          </div>
        )}
      </div>

      {/* 三位玩家 */}
      {pState&&(
        <div style={{display:'flex',gap:10,flex:1,alignItems:'flex-start'}}>
          {pState.map(p=><PlayerBox key={p.id} p={p}/>)}
        </div>
      )}

      {/* 開牌：合計損益 + 下一手 */}
      {phase==='showdown'&&pState&&(
        <div style={{background:'rgba(0,0,0,.3)',borderRadius:10,
          padding:'10px 16px',display:'flex',
          justifyContent:'space-between',alignItems:'center'}}>
          <div>
            <span style={{fontSize:12,color:DIM}}>本手合計 </span>
            <span style={{fontWeight:800,fontSize:22,
              color:totalPnl>0?GRN:totalPnl<0?RED:ACC}}>
              {totalPnl>=0?'+':''}{totalPnl} ante
            </span>
          </div>
          <button style={{background:GRN,color:'#fff',border:'none',borderRadius:8,
            fontWeight:700,fontSize:15,padding:'11px 28px',cursor:'pointer'}} onClick={startNew}>
            下一手 →
          </button>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
