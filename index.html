<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useCallback,useEffect}=React;

// ── 常數 ──────────────────────────────────────────────────────
const RC='23456789TJQKA';
const SYMS=['♠','♥','♦','♣'];
const IS_RED=[false,true,true,false];
// 門檻設定：Flop(Equity) 32, Turn(Win%) 51, River(Win%) 51
// 優先棄牌：玩家最高牌==莊家明牌，另一張<7（A/K/Q時<8）
const FT=32,TT=51,RT=51; 

const DECK=[];
for(let r=0;r<13;r++) for(let s=0;s<4;s++) DECK.push({r:r+2,rc:RC[r],s,id:r*4+s});

function shuffle(arr){
  const d=[...arr];
  for(let i=d.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[d[i],d[j]]=[d[j],d[i]];}
  return d;
}

// 發牌：dealer×2, com×5, p1×2, p2×2, p3×2 = 13張
function dealHand(){
  const d=shuffle(DECK);
  return {
    dealer:[d[0],d[1]],
    com:d.slice(2,7),
    players:[
      {id:0,label:'玩家 1',hole:[d[7],d[8]]},
      {id:1,label:'玩家 2',hole:[d[9],d[10]]},
      {id:2,label:'玩家 3',hole:[d[11],d[12]]},
    ]
  };
}


// ── 優先棄牌規則 ──────────────────────────────────────────────
// 玩家最高牌 == 莊家明牌，且另一張 < 7（A/K/Q 時 < 8）
function priorityFold(hole, dealer1) {
  const hi = Math.max(hole[0].r, hole[1].r);
  const lo = Math.min(hole[0].r, hole[1].r);
  if (hi !== dealer1.r) return false;
  const thresh = dealer1.r >= 12 ? 8 : 7; // A(14)/K(13)/Q(12) 用 8，其餘用 7
  return lo < thresh;
}

// ── 牌型評分 ──────────────────────────────────────────────────
function stTop(rks){
  const u=[...new Set(rks)].sort((a,b)=>b-a);
  if(u.length<5)return 0;
  for(let i=0;i<=u.length-5;i++)if(u[i]-u[i+4]===4)return u[i];
  if([14,2,3,4,5].every(v=>u.includes(v)))return 5;
  return 0;
}
function eval7(cards){
  const su=[0,0,0,0];cards.forEach(c=>su[c.s]++);
  const rks=cards.map(c=>c.r).sort((a,b)=>b-a);
  const fs=su.findIndex(n=>n>=5);
  if(fs>=0){const fr=cards.filter(c=>c.s===fs).map(c=>c.r).sort((a,b)=>b-a);const sf=stTop(fr);if(sf)return 8e8+sf;}
  const cnt={};rks.forEach(r=>cnt[r]=(cnt[r]||0)+1);
  const g=Object.entries(cnt).map(([r,n])=>({r:+r,n})).sort((a,b)=>b.n-a.n||b.r-a.r);
  if(g[0].n===4)return 7e8+(g[0].r<<16)+g.find(x=>x.r!==g[0].r).r;
  if(g[0].n===3&&g[1]&&g[1].n>=2)return 6e8+(g[0].r<<16)+g[1].r;
  if(fs>=0){const fr=cards.filter(c=>c.s===fs).map(c=>c.r).sort((a,b)=>b-a);return 5e8+fr.slice(0,5).reduce((a,r,i)=>a+(r<<(4*(4-i))),0);}
  const st=stTop(rks);if(st)return 4e8+st;
  if(g[0].n===3)return 3e8+(g[0].r<<16)+(g[1].r<<4)+g[2].r;
  if(g[0].n===2&&g[1]&&g[1].n===2){const k=g.find(x=>x.n===1).r;return 2e8+(g[0].r<<16)+(g[1].r<<8)+k;}
  if(g[0].n===2){const ks=rks.filter(r=>r!==g[0].r).slice(0,3);return 1e8+(g[0].r<<16)+(ks[0]<<8)+(ks[1]<<4)+ks[2];}
  return rks.slice(0,5).reduce((a,r,i)=>a+(r<<(4*(4-i))),0);
}
function handName(s){
  if(s>=8e8)return'同花順';if(s>=7e8)return'四條';if(s>=6e8)return'葫蘆';
  if(s>=5e8)return'同花';if(s>=4e8)return'順子';if(s>=3e8)return'三條';
  if(s>=2e8)return'兩對';if(s>=1e8)return'一對';return'高牌';
}

// ── 資訊交流版勝率計算 (完美上帝視角扣除死牌) ───────────────────────────

// Flop：高精度 Monte Carlo 取樣，提升至 N=10000 確保準確度
function calcFlopEqAll(allPlayers, dealer1, com1, N=10000) {
  const known = new Set();
  allPlayers.forEach(p => p.hole.forEach(c => known.add(c.id)));
  known.add(dealer1.id);
  known.add(com1.id);

  const deck = DECK.filter(c => !known.has(c.id));
  let results = {};
  
  allPlayers.forEach(p => results[p.id] = {w:0, t:0, total:0});

  for(let i=0; i<N; i++) {
    let temp = [...deck];
    const picks = [];
    for(let k=0; k<5; k++) {
      const idx = Math.floor(Math.random() * temp.length);
      picks.push(temp[idx]);
      temp[idx] = temp[temp.length-1];
      temp.pop();
    }
    const d2 = picks[0];
    const com5 = [com1, picks[1], picks[2], picks[3], picks[4]];
    const dScore = eval7([dealer1, d2, ...com5]);

    allPlayers.forEach(p => {
      const pScore = eval7([...p.hole, ...com5]);
      if (pScore > dScore) results[p.id].w++;
      else if (pScore === dScore) results[p.id].t++;
      results[p.id].total++;
    });
  }
  return results;
}

// Turn：窮舉 D2 × 窮舉 Turn × 隨機 River 取樣 1 次
function calcTurnEnumAll(allPlayers, dealer1, com3) {
  const known = new Set();
  allPlayers.forEach(p => p.hole.forEach(c => known.add(c.id)));
  known.add(dealer1.id);
  com3.forEach(c => known.add(c.id));

  const deck = DECK.filter(c => !known.has(c.id));
  let results = {};
  const activePlayers = allPlayers.filter(p => !p.folded);
  activePlayers.forEach(p => results[p.id] = {w:0, t:0, total:0});

  for(let i=0; i<deck.length; i++) {
    const d2 = deck[i];
    const rem2 = deck.filter((_, idx) => idx !== i);
    for(let j=0; j<rem2.length; j++) {
      const c4 = rem2[j];
      const rem3 = rem2.filter((_, idx) => idx !== j);
      const c5 = rem3[Math.floor(Math.random() * rem3.length)];
      const com5 = [...com3, c4, c5];
      const dScore = eval7([dealer1, d2, ...com5]);
      
      activePlayers.forEach(p => {
        const pScore = eval7([...p.hole, ...com5]);
        if (pScore > dScore) results[p.id].w++;
        else if (pScore === dScore) results[p.id].t++;
        results[p.id].total++;
      });
    }
  }
  return results;
}

// River：窮舉 D2 × 窮舉 River
function calcRiverEnumAll(allPlayers, dealer1, com4) {
  const known = new Set();
  allPlayers.forEach(p => p.hole.forEach(c => known.add(c.id)));
  known.add(dealer1.id);
  com4.forEach(c => known.add(c.id));

  const deck = DECK.filter(c => !known.has(c.id));
  let results = {};
  const activePlayers = allPlayers.filter(p => !p.folded);
  activePlayers.forEach(p => results[p.id] = {w:0, t:0, total:0});

  for(let i=0; i<deck.length; i++) {
    const d2 = deck[i];
    const rem2 = deck.filter((_, idx) => idx !== i);
    for(let j=0; j<rem2.length; j++) {
      const c5 = rem2[j];
      const com5 = [...com4, c5];
      const dScore = eval7([dealer1, d2, ...com5]);
      
      activePlayers.forEach(p => {
        const pScore = eval7([...p.hole, ...com5]);
        if (pScore > dScore) results[p.id].w++;
        else if (pScore === dScore) results[p.id].t++;
        results[p.id].total++;
      });
    }
  }
  return results;
}

function calcPnL(hole,dealer,com,bets){
  const ps=eval7([...hole,...com]),ds=eval7([...dealer,...com]);
  const side=bets.flop+(bets.turn||0)+(bets.river||0);
  if(ps>ds)return{result:'win',pnl:side+(ps>=4e8?1:0),ps,ds};
  if(ps===ds)return{result:'tie',pnl:0,ps,ds};
  return{result:'lose',pnl:-(1+side),ps,ds};
}

// ── CardView ──────────────────────────────────────────────────
function Card({card,hidden,w=64,h=90}){
  if(hidden)return(
    <div style={{width:w,height:h,borderRadius:6,
      background:'linear-gradient(135deg,#0d2f45,#1a4f70)',
      border:'2px solid rgba(255,255,255,0.2)',display:'flex',alignItems:'center',justifyContent:'center',
      flexShrink:0,boxShadow:'2px 4px 10px rgba(0,0,0,.5)'}}>
      <span style={{color:'#2471a3',fontSize:h*.35,opacity:.35}}>♠</span>
    </div>
  );
  const col=IS_RED[card.s]?'#e74c3c':'#2c3e50';
  const sym=SYMS[card.s];
  return(
    <div style={{width:w,height:h,borderRadius:6,background:'#fff',
      border:'1px solid #ccc',display:'flex',flexDirection:'column',
      alignItems:'center',justifyContent:'center',
      padding:'3px 4px',flexShrink:0,boxShadow:'2px 4px 10px rgba(0,0,0,.4)'}}>
      <span style={{fontWeight:900,fontSize:h*.45,color:col,lineHeight:1}}>{card.rc}</span>
      <span style={{fontSize:h*.35,color:col,marginTop:0}}>{sym}</span>
    </div>
  );
}

// ── 主程式 ────────────────────────────────────────────────────
function App(){
  const G={felt:'#35654d',rail:'#4a3b32',bg:'#1a1a1a',text:'#f0efe8',dim:'rgba(240,239,232,.6)',
           accent:'#f1c40f',green:'#2ecc71',red:'#e74c3c',darkZone:'rgba(0,0,0,0.25)'};

  const [deal,setDeal]=useState(null);
  const [pState,setPState]=useState(null);
  const [phase,setPhase]=useState('start');
  const [computing,setComputing]=useState(null); 
  const [stats,setStats]=useState({hands:0,pnl:0,
    flop:{c:0,t:0},turn:{c:0,t:0},river:{c:0,t:0}});

  const startNew=()=>{
    const h=dealHand();
    setDeal(h);
    setPState(h.players.map(p=>({
      id:p.id,hole:p.hole,
      folded:false,
      bets:{flop:0,turn:0,river:0},
      choices:{flop:null,turn:null,river:null},
      metrics:{flopEq:null,turnWr:null,riverWr:null},
      outcome:null,
    })));
    setPhase('flop_decide');
    setComputing(null);
  };

  const onFlopChoice=(pid,choice)=>{
    const newPS=pState.map(p=>p.id!==pid?p:{...p,choices:{...p.choices,flop:choice}});
    setPState(newPS);
    if(newPS.every(p=>p.choices.flop!==null)){
      
      const results = calcFlopEqAll(newPS, deal.dealer[0], deal.com[0]);
      
      const withEq=newPS.map(p=>{
        const r = results[p.id];
        const eq = r.total > 0 ? ((r.w + r.t/2)/r.total)*100 : 50; 
        const isFold = (p.choices.flop==='fold');
        // 記錄是否觸發優先棄牌規則（用於正確性判斷）
        const isPriority = priorityFold(p.hole, deal.dealer[0]);
        return {...p, metrics:{...p.metrics, flopEq:eq, isPriorityFold:isPriority}, folded:isFold, bets:{...p.bets, flop:isFold?0:2}};
      });
      
      setPState(withEq);
      const active=withEq.filter(p=>!p.folded);
      if(active.length===0){
        const finalPS=withEq.map(p=>({...p,outcome:{result:'fold',pnl:-1,ps:null,ds:null}}));
        const dStats=computeStats(stats,finalPS,true);
        setPState(finalPS); setStats({...dStats,pnl:dStats.pnl}); setPhase('showdown');
      } else {
        computeTurn(withEq);
      }
    }
  };

  function computeTurn(ps){
    setComputing('計算 Turn...');
    setTimeout(()=>{
      const results = calcTurnEnumAll(ps, deal.dealer[0], deal.com.slice(0,3));
      const updated = ps.map(p => {
        if(p.folded) return p;
        const r = results[p.id];
        const wr = r.total > 0 ? (r.w / r.total) * 100 : 0;
        return {...p, metrics:{...p.metrics, turnWr: wr}};
      });
      setPState(updated);
      setComputing(null);
      setPhase('turn_decide');
    }, 10);
  }

  const onTurnChoice=(pid,choice)=>{
    const newPS=pState.map(p=>p.id!==pid||p.folded?p:{...p,choices:{...p.choices,turn:choice},bets:{...p.bets,turn:choice==='bet'?1:0}});
    setPState(newPS);
    const active=newPS.filter(p=>!p.folded);
    if(active.every(p=>p.choices.turn!==null)){
      computeRiver(newPS);
    }
  };

  function computeRiver(ps){
    setComputing('計算 River...');
    setTimeout(()=>{
      const results = calcRiverEnumAll(ps, deal.dealer[0], deal.com.slice(0,4));
      const updated = ps.map(p => {
        if(p.folded) return p;
        const r = results[p.id];
        const wr = r.total > 0 ? (r.w / r.total) * 100 : 0;
        return {...p, metrics:{...p.metrics, riverWr: wr}};
      });
      setPState(updated);
      setComputing(null);
      setPhase('river_decide');
    }, 10);
  }

  const onRiverChoice=(pid,choice)=>{
    const newPS=pState.map(p=>p.id!==pid||p.folded?p:{...p,choices:{...p.choices,river:choice},bets:{...p.bets,river:choice==='bet'?1:0}});
    const active=newPS.filter(p=>!p.folded);
    if(active.every(p=>p.choices.river!==null)){
      const final=newPS.map(p=>{
        if(p.folded)return{...p,outcome:{result:'fold',pnl:-1,ps:null,ds:null}};
        const res=calcPnL(p.hole,deal.dealer,deal.com,p.bets);
        return{...p,outcome:res};
      });
      const newStats=computeStats(stats,final,false);
      setPState(final);
      setStats(newStats);
      setPhase('showdown');
    } else {
      setPState(newPS);
    }
  };

  function computeStats(oldStats,ps,allFolded){
    let ns={...oldStats,hands:oldStats.hands+1};
    const totalPnl=ps.reduce((s,p)=>s+(p.outcome?p.outcome.pnl:0),0);
    ns.pnl=ns.pnl+totalPnl;
    ps.forEach(p=>{
      const m=p.metrics,c=p.choices;
      
      if(m.flopEq!==null&&c.flop!==null){
        ns.flop={...ns.flop,t:ns.flop.t+1};
        // 優先棄牌：最高牌==莊家且踢腳太小，正確答案是棄牌
        const shouldFold = m.isPriorityFold ? true : !(m.flopEq>FT);
        if((c.flop==='bet'&&!shouldFold)||(c.flop==='fold'&&shouldFold))ns.flop={...ns.flop,c:ns.flop.c+1};
      }
      if(m.turnWr!==null&&c.turn!==null&&!p.folded){
        ns.turn={...ns.turn,t:ns.turn.t+1};
        const ok=(c.turn==='bet'&&m.turnWr>TT)||(c.turn==='check'&&m.turnWr<=TT);
        if(ok)ns.turn={...ns.turn,c:ns.turn.c+1};
      }
      if(m.riverWr!==null&&c.river!==null&&!p.folded){
        ns.river={...ns.river,t:ns.river.t+1};
        const ok=(c.river==='bet'&&m.riverWr>RT)||(c.river==='check'&&m.riverWr<=RT);
        if(ok)ns.river={...ns.river,c:ns.river.c+1};
      }
    });
    return ns;
  }

  const showCom=phase==='showdown'?[1,1,1,1,1]:
    ['river_decide','computing_river'].includes(phase)?[1,1,1,1,0]:
    ['turn_decide','computing_turn'].includes(phase)||phase==='river_decide'?[1,1,1,0,0]:
    [1,0,0,0,0]; // Flop 顯示第一張公牌
  const showDealer=phase==='showdown';

  const BB={padding:'10px 0',borderRadius:20,fontWeight:700,fontSize:14,border:'none',flex:1, letterSpacing:1};
  const bG={...BB,background:'#27ae60',color:'#fff',boxShadow:'0 4px 0 #1e8449'};
  const bR={...BB,background:'#c0392b',color:'#fff',boxShadow:'0 4px 0 #922b21'};
  const bGr={...BB,background:'rgba(255,255,255,.1)',color:'#fff',border:'1px solid rgba(255,255,255,.2)',boxShadow:'0 4px 0 rgba(0,0,0,.2)'};

  function PlayerBox({p}){
    const flopDone=p.choices.flop!==null;
    const turnDone=p.choices.turn!==null;
    const riverDone=p.choices.river!==null;

    let buttons=null;
    if(phase==='flop_decide'&&!flopDone){
      buttons=<div style={{display:'flex',gap:10,marginTop:15}}>
        <button style={bR} onClick={()=>onFlopChoice(p.id,'fold')} onMouseLeave={e=>e.currentTarget.style.transform='translateY(0)'} onMouseDown={e=>e.currentTarget.style.transform='translateY(4px)'}>棄牌</button>
        <button style={bG} onClick={()=>onFlopChoice(p.id,'bet')} onMouseLeave={e=>e.currentTarget.style.transform='translateY(0)'} onMouseDown={e=>e.currentTarget.style.transform='translateY(4px)'}>BET 2×</button>
      </div>;
    } else if(phase==='flop_decide'&&flopDone){
      buttons=<div style={{marginTop:15,fontSize:13,color:G.dim,textAlign:'center',background:'rgba(0,0,0,0.3)',padding:'8px',borderRadius:20}}>
        已選：<b style={{color:p.choices.flop==='fold'?G.red:G.accent}}>{p.choices.flop==='fold'?'棄牌':'BET 2×'}</b>
      </div>;
    } else if(phase==='turn_decide'&&!p.folded&&!turnDone){
      buttons=<div style={{display:'flex',gap:10,marginTop:15}}>
        <button style={bGr} onClick={()=>onTurnChoice(p.id,'check')} onMouseLeave={e=>e.currentTarget.style.transform='translateY(0)'} onMouseDown={e=>e.currentTarget.style.transform='translateY(4px)'}>Check</button>
        <button style={bG} onClick={()=>onTurnChoice(p.id,'bet')} onMouseLeave={e=>e.currentTarget.style.transform='translateY(0)'} onMouseDown={e=>e.currentTarget.style.transform='translateY(4px)'}>BET 1×</button>
      </div>;
    } else if(phase==='turn_decide'&&!p.folded&&turnDone){
      buttons=<div style={{marginTop:15,fontSize:13,color:G.dim,textAlign:'center',background:'rgba(0,0,0,0.3)',padding:'8px',borderRadius:20}}>
        已選：<b style={{color:p.choices.turn==='check'?'#fff':G.accent}}>{p.choices.turn==='check'?'Check':'BET 1×'}</b>
      </div>;
    } else if(phase==='river_decide'&&!p.folded&&!riverDone){
      buttons=<div style={{display:'flex',gap:10,marginTop:15}}>
        <button style={bGr} onClick={()=>onRiverChoice(p.id,'check')} onMouseLeave={e=>e.currentTarget.style.transform='translateY(0)'} onMouseDown={e=>e.currentTarget.style.transform='translateY(4px)'}>Check</button>
        <button style={bG} onClick={()=>onRiverChoice(p.id,'bet')} onMouseLeave={e=>e.currentTarget.style.transform='translateY(0)'} onMouseDown={e=>e.currentTarget.style.transform='translateY(4px)'}>BET 1×</button>
      </div>;
    } else if(phase==='river_decide'&&!p.folded&&riverDone){
      buttons=<div style={{marginTop:15,fontSize:13,color:G.dim,textAlign:'center',background:'rgba(0,0,0,0.3)',padding:'8px',borderRadius:20}}>
        已選：<b style={{color:p.choices.river==='check'?'#fff':G.accent}}>{p.choices.river==='check'?'Check':'BET 1×'}</b>
      </div>;
    }

    let resultBlock=null;
    if(phase==='showdown'&&p.outcome){
      const o=p.outcome;
      const rc=o.result==='win'?G.green:o.result==='tie'?G.accent:G.red;
      const rl={win:'✓ 贏了',tie:'～ 平',fold:'棄牌',lose:'✗ 輸了'}[o.result];
      const m=p.metrics,c=p.choices;
      
      const shouldFoldFlop = m.isPriorityFold ? true : !(m.flopEq>FT);
      const flopOk=m.flopEq!==null&&((c.flop==='bet'&&!shouldFoldFlop)||(c.flop==='fold'&&shouldFoldFlop));
      const turnOk=m.turnWr!==null&&((c.turn==='bet'&&m.turnWr>TT)||(c.turn==='check'&&m.turnWr<=TT));
      const riverOk=m.riverWr!==null&&((c.river==='bet'&&m.riverWr>RT)||(c.river==='check'&&m.riverWr<=RT));
      
      resultBlock=<div style={{marginTop:12,background:'rgba(0,0,0,0.4)',padding:'10px',borderRadius:12}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
          <span style={{fontWeight:800,color:rc,fontSize:15}}>{rl}</span>
          <span style={{fontWeight:900,fontSize:20,color:o.pnl>0?G.green:o.pnl<0?G.red:G.accent}}>
            {o.pnl>=0?'+':''}{o.pnl}
          </span>
        </div>
        {o.ps!=null&&<div style={{fontSize:12,color:G.dim,marginBottom:8,textAlign:'center',borderBottom:'1px solid rgba(255,255,255,0.1)',paddingBottom:6}}>
          {handName(o.ps)} vs 莊{handName(o.ds)}
        </div>}
        <div style={{fontSize:12,display:'flex',flexDirection:'column',gap:5}}>
          {m.flopEq!==null&&<div style={{display:'flex',justifyContent:'space-between',color:flopOk?G.green:G.red}}>
            <span>F: {flopOk?'✓':'✗'} {m.flopEq.toFixed(1)}%</span>
            <span>{m.flopEq>FT?'應BET':'應棄'} (選{c.flop==='fold'?'棄':'BET'})</span>
          </div>}
          {!p.folded&&m.turnWr!==null&&<div style={{display:'flex',justifyContent:'space-between',color:turnOk?G.green:G.red}}>
            <span>T: {turnOk?'✓':'✗'} {m.turnWr.toFixed(1)}%</span>
            <span>{m.turnWr>TT?'應BET':'應Chk'} (選{c.turn==='bet'?'BET':'Chk'})</span>
          </div>}
          {!p.folded&&m.riverWr!==null&&<div style={{display:'flex',justifyContent:'space-between',color:riverOk?G.green:G.red}}>
            <span>R: {riverOk?'✓':'✗'} {m.riverWr.toFixed(1)}%</span>
            <span>{m.riverWr>RT?'應BET':'應Chk'} (選{c.river==='bet'?'BET':'Chk'})</span>
          </div>}
        </div>
      </div>;
    }

    const isFolded=p.folded&&phase!=='showdown'&&phase!=='flop_decide';
    return(
      <div style={{background:G.darkZone,borderRadius:16,padding:'16px',
        flex:1,minWidth:0,opacity:isFolded?.5:1,
        border:`1px solid rgba(255,255,255,0.05)`,boxShadow:'inset 0 0 20px rgba(0,0,0,0.2)'}}>
        <div style={{fontSize:15,color:G.accent,fontWeight:800,marginBottom:12,letterSpacing:1,textAlign:'center',textShadow:'1px 1px 2px #000'}}>
          {p.label} {isFolded&&<span style={{color:G.red,fontWeight:400,fontSize:13}}>（棄牌）</span>}
        </div>
        <div style={{display:'flex',gap:6,justifyContent:'center'}}>
          <Card card={p.hole[0]} w={68} h={96}/>
          <Card card={p.hole[1]} w={68} h={96}/>
        </div>
        <div style={{fontSize:12,color:G.dim,marginTop:12,display:'flex',justifyContent:'center',gap:12}}>
          <span style={{background:'rgba(0,0,0,0.5)',padding:'2px 8px',borderRadius:10}}>A<b style={{color:'#fff',marginLeft:4}}>1</b></span>
          {p.bets.flop>0&&<span style={{background:'rgba(0,0,0,0.5)',padding:'2px 8px',borderRadius:10}}>F<b style={{color:G.accent,marginLeft:4}}>{p.bets.flop}</b></span>}
          {p.bets.turn>0&&<span style={{background:'rgba(0,0,0,0.5)',padding:'2px 8px',borderRadius:10}}>T<b style={{color:G.accent,marginLeft:4}}>{p.bets.turn}</b></span>}
          {p.bets.river>0&&<span style={{background:'rgba(0,0,0,0.5)',padding:'2px 8px',borderRadius:10}}>R<b style={{color:G.accent,marginLeft:4}}>{p.bets.river}</b></span>}
        </div>
        {buttons}
        {resultBlock}
      </div>
    );
  }

  function StatBadge({label,s}){
    const pct=s.t>0?Math.round(s.c/s.t*100):null;
    const col=pct===null?'#fff':pct>=70?G.green:pct>=50?G.accent:G.red;
    return(
      <div style={{textAlign:'center',minWidth:80}}>
        <div style={{fontSize:11,color:G.dim,letterSpacing:1}}>{label}</div>
        <div style={{fontWeight:800,fontSize:18,color:col}}>
          {pct===null?'-':pct+'%'}
          {s.t>0&&<span style={{fontSize:11,color:G.dim,marginLeft:4,fontWeight:400}}>{s.c}/{s.t}</span>}
        </div>
      </div>
    );
  }

  return(
    <div style={{minHeight:'100vh',background:G.bg,color:G.text,
      display:'flex',flexDirection:'column',alignItems:'center',padding:'20px 10px'}}>

      {/* 頂部 HUD 資訊列 */}
      {phase!=='start'&&(
        <div style={{display:'flex',gap:20,marginBottom:20,background:'linear-gradient(to right, rgba(0,0,0,0), rgba(0,0,0,0.5), rgba(0,0,0,0))',
          padding:'12px 30px',justifyContent:'center',width:'100%',maxWidth:900,borderBottom:'1px solid rgba(255,255,255,0.05)'}}>
          <div style={{textAlign:'center',minWidth:60}}>
            <div style={{fontSize:11,color:G.dim,letterSpacing:1}}>手數</div>
            <div style={{fontWeight:800,fontSize:18}}>{stats.hands}</div>
          </div>
          <StatBadge label="FLOP 正確" s={stats.flop}/>
          <StatBadge label="TURN 正確" s={stats.turn}/>
          <StatBadge label="RIVER 正確" s={stats.river}/>
          <div style={{textAlign:'center',minWidth:80}}>
            <div style={{fontSize:11,color:G.dim,letterSpacing:1}}>累積損益</div>
            <div style={{fontWeight:900,fontSize:18,
              color:stats.pnl>0?G.green:stats.pnl<0?G.red:'#fff'}}>
              {stats.pnl>=0?'+':''}{stats.pnl}
            </div>
          </div>
        </div>
      )}

      {/* 開始畫面 */}
      {phase==='start'&&(
        <div style={{textAlign:'center',maxWidth:500,paddingTop:60}}>
          <div style={{fontSize:70,marginBottom:16,filter:'drop-shadow(0 4px 10px rgba(0,0,0,0.5))'}}>♠️♥️</div>
          <h1 style={{fontSize:36,fontWeight:900,color:G.accent,marginBottom:16,textShadow:'0 2px 5px #000'}}>THB 3人練習</h1>
          <p style={{color:G.dim,lineHeight:1.8,fontSize:15,marginBottom:30}}>
            每手發 3 家牌。依序為玩家做 Flop/Turn/River 決策。<br/>所有決策完成後開牌，並顯示判斷是否正確。
          </p>
          <div style={{background:'rgba(255,255,255,0.05)',borderRadius:16,padding:'20px 24px',marginBottom:36,
            textAlign:'left',fontSize:14,lineHeight:2.4,boxShadow:'inset 0 0 20px rgba(0,0,0,0.5)'}}>
            <div style={{marginBottom:6}}><span style={{color:'#e74c3c',fontWeight:800,display:'inline-block',width:60}}>⚡ 優先棄</span> 最高牌==莊家 且 另一張 &lt; <b style={{color:'#fff'}}>7</b>（A/K/Q時&lt;<b style={{color:'#fff'}}>8</b>）</div>
            <div><span style={{color:G.accent,fontWeight:800,display:'inline-block',width:60}}>Flop</span> 其餘：Equity &gt; <b style={{color:'#fff'}}>{FT}%</b> → BET 2×</div>
            <div><span style={{color:G.accent,fontWeight:800,display:'inline-block',width:60}}>Turn</span> 勝率 &gt; <b style={{color:'#fff'}}>{TT}%</b> → BET 1×</div>
            <div><span style={{color:G.accent,fontWeight:800,display:'inline-block',width:60}}>River</span> 勝率 &gt; <b style={{color:'#fff'}}>{RT}%</b> → BET 1×</div>
            <div style={{color:G.dim,fontSize:12,marginTop:10,lineHeight:1.6,borderTop:'1px dashed rgba(255,255,255,0.2)',paddingTop:10}}>
              💡 支援玩家資訊交流：莊家明牌與第一張公牌花色皆直接已知。計算時會將全桌玩家手牌作為「死牌」扣除，並採用最高精度 10,000 次蒙地卡羅抽樣以確保勝率無誤差。
            </div>
          </div>
          <button style={{...bG,padding:'18px 60px',fontSize:20,flex:'none',width:'auto',borderRadius:30}} onClick={startNew}>
            進入牌桌 →
          </button>
        </div>
      )}

      {/* 牌桌區域 */}
      {deal&&phase!=='start'&&(
        <div style={{
          width:'100%', maxWidth:1000,
          background:G.felt,
          borderRadius:120,
          border:`16px solid ${G.rail}`,
          boxShadow:'inset 0 0 80px rgba(0,0,0,0.8), 0 20px 50px rgba(0,0,0,0.6)',
          padding:'30px 40px 40px 40px',
          display:'flex', flexDirection:'column', alignItems:'center',
          position:'relative'
        }}>

          {/* 牌桌提示文字 */}
          <div style={{
            position:'absolute',top:20,
            background:'rgba(0,0,0,0.6)',padding:'6px 20px',borderRadius:20,
            fontSize:13,fontWeight:700,color:G.accent,letterSpacing:1,
            boxShadow:'0 2px 10px rgba(0,0,0,0.5)', border:'1px solid rgba(241,196,15,0.2)'
          }}>
            {computing ? `⏳ ${computing}` : 
             phase==='flop_decide' ? `📍 FLOP 階段 | ⚡優先棄 或 Equity > ${FT}%` :
             phase==='turn_decide' ? `📍 TURN 階段 | 目標 勝率 > ${TT}%` :
             phase==='river_decide'? `📍 RIVER 階段 | 目標 勝率 > ${RT}%` :
             `📍 結算 SHOWDOWN`}
          </div>

          {/* 公牌區 (橢圓黑底) */}
          <div style={{
            background:G.darkZone, borderRadius:80, padding:'25px 40px',
            display:'flex', flexDirection:'column', alignItems:'center',
            border:'3px solid rgba(0,0,0,0.15)', boxShadow:'inset 0 0 20px rgba(0,0,0,0.4)',
            marginTop:40, marginBottom:20
          }}>
            <div style={{fontSize:13,color:G.dim,marginBottom:12,letterSpacing:2,fontWeight:800}}>公牌 (COMMUNITY)</div>
            <div style={{display:'flex',gap:8}}>
              {deal.com.map((c,i)=>{
                if(showCom[i])return<Card key={i} card={c} w={72} h={100}/>;
                return<Card key={i} card={c} hidden w={72} h={100}/>;
              })}
            </div>
          </div>

          {/* 莊家區 (橢圓黑底) */}
          <div style={{
            background:G.darkZone, borderRadius:60, padding:'20px 35px',
            display:'flex', flexDirection:'column', alignItems:'center',
            border:'2px solid rgba(0,0,0,0.1)', boxShadow:'inset 0 0 15px rgba(0,0,0,0.3)',
            marginBottom:30
          }}>
            <div style={{fontSize:13,color:G.accent,marginBottom:10,letterSpacing:2,fontWeight:800}}>莊家 (DEALER)</div>
            <div style={{display:'flex',gap:8}}>
              <Card card={deal.dealer[0]} w={68} h={96}/>
              <Card card={deal.dealer[1]} hidden={!showDealer} w={68} h={96}/>
            </div>
          </div>

          {/* 玩家列 */}
          <div style={{display:'flex',gap:16,width:'100%',justifyContent:'center'}}>
            {pState.map(p=><PlayerBox key={p.id} p={p}/>)}
          </div>

          {/* 結算按鈕 */}
          {phase==='showdown'&&pState&&(
            <div style={{marginTop:30}}>
              <button style={{...bG,padding:'16px 50px',fontSize:18,borderRadius:30,boxShadow:'0 6px 0 #1e8449, 0 10px 20px rgba(0,0,0,0.5)'}}
                onMouseLeave={e=>e.currentTarget.style.transform='translateY(0)'} 
                onMouseDown={e=>e.currentTarget.style.transform='translateY(6px)'}
                onClick={startNew}>發下一手牌 🔄</button>
            </div>
          )}

        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
